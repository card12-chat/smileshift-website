<!-- Component: Pricing CTA (Intermediate Call to Action) -->
<section id="pricing-cta-section" class="relative py-20 bg-stone-50 overflow-hidden border-t border-b border-stone-100 flex flex-col items-center justify-center text-center px-4">
    <!-- Subtle Background Glows -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-smile-purple-main/5 blur-[120px] rounded-full pointer-events-none"></div>

    <div class="relative z-10 max-w-2xl mx-auto flex flex-col items-center">
        <!-- Badge -->
        <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-wider bg-smile-purple-main/5 text-smile-purple-main border border-smile-purple-main/10 mb-6">
            <iconify-icon icon="lucide:sparkles" class="text-xs"></iconify-icon>
            Ofertas por Tempo Limitado
        </span>

        <h3 class="font-display text-2xl md:text-3xl font-bold text-smile-text mb-4 leading-tight uppercase">
            Pronto para transformar seu sorriso?
        </h3>
        
        <p class="text-sm text-stone-500 font-light mb-8 max-w-md">
            Garanta até 62% de desconto e frete grátis para todo o Brasil. Clique abaixo e selecione seu kit ideal.
        </p>

        <!-- Dynamic intermediate CTA Button with smooth hover scale and active pulse glow -->
        <button onclick="smoothScrollTo('#hero-offer')" 
                class="relative px-8 py-4 bg-smile-purple-main text-white font-bold text-xs uppercase tracking-wider rounded-xl hover:bg-smile-purple-vivid transition-all duration-300 transform hover:scale-[1.05] active:scale-[0.98] shadow-[0_4px_20px_rgba(90,44,140,0.2)] hover:shadow-[0_8px_30px_rgba(90,44,140,0.35)] animate-pulse-glow flex items-center gap-2 group">
            <span>Quero Garantir Meu Kit</span>
            <iconify-icon icon="lucide:arrow-up-right" class="text-sm group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform"></iconify-icon>
        </button>
    </div>
</section>
